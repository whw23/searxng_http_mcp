<svg xmlns="http://www.w3.org/2000/svg" width="420" height="248" viewBox="0 0 420 248">
  <defs>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- Dialog background -->
  <rect x="10" y="10" width="400" height="228" rx="12" fill="#fff" filter="url(#shadow)" stroke="#d1d5db" stroke-width="0.5"/>

  <!-- Header -->
  <text x="210" y="42" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="600" fill="#1f2937">Sign in</text>
  <text x="210" y="62" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11.5" fill="#6b7280">http://{your-server}:{port}</text>

  <!-- Username label + field -->
  <text x="40" y="92" font-family="system-ui,sans-serif" font-size="12" fill="#374151">Username</text>
  <rect x="40" y="98" width="340" height="30" rx="5" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="52" y="118" font-family="system-ui,sans-serif" font-size="12" fill="#9ca3af" font-style="italic">leave empty</text>

  <!-- Password label + field -->
  <text x="40" y="148" font-family="system-ui,sans-serif" font-size="12" fill="#374151">Password</text>
  <rect x="40" y="154" width="340" height="30" rx="5" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="52" y="174" font-family="system-ui,sans-serif" font-size="14" fill="#1f2937" letter-spacing="3">********</text>

  <!-- Buttons -->
  <rect x="228" y="200" width="72" height="30" rx="6" fill="#fff" stroke="#d1d5db"/>
  <text x="264" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#374151">Cancel</text>
  <rect x="308" y="200" width="72" height="30" rx="6" fill="#2563eb"/>
  <text x="344" y="220" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#fff" font-weight="500">Sign in</text>
</svg>
