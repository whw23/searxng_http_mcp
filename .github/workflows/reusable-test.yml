name: Reusable Test

on:
  workflow_call:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=mcp_server --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            echo "## Coverage Report" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            uv run python -m coverage report 2>/dev/null || echo "Coverage data not available"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Test report summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: test-results.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            test-results.xml
            coverage.xml

  consistency-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v5
        with:
          python-version: "3.14"

      - name: Check requirements.docker.txt is synced with uv.lock
        run: |
          uv export --no-dev --no-editable --no-emit-project --no-header --format requirements-txt -o requirements.docker.txt.generated
          tail -n +3 requirements.docker.txt > requirements.docker.txt.noheader
          if ! diff -q requirements.docker.txt.noheader requirements.docker.txt.generated >/dev/null 2>&1; then
            echo "::error::requirements.docker.txt is out of sync with uv.lock. Run: uv export --no-dev --no-editable --no-emit-project --format requirements-txt -o requirements.docker.txt"
            diff requirements.docker.txt.noheader requirements.docker.txt.generated || true
            exit 1
          fi
          echo "requirements.docker.txt is in sync with uv.lock"

      - name: Check plugin consistency (local vs remote vs standalone)
        run: |
          diff -r plugins/local/skills plugins/remote/skills || { echo "::error::Skills differ between local and remote plugins"; exit 1; }
          diff -r plugins/local/skills plugins/standalone/skills || { echo "::error::Skills differ between local and standalone plugins"; exit 1; }
          diff -r plugins/local/agents plugins/remote/agents || { echo "::error::Agents differ between local and remote plugins"; exit 1; }
          diff -r plugins/local/agents plugins/standalone/agents || { echo "::error::Agents differ between local and standalone plugins"; exit 1; }
          diff plugins/local/AGENTS.md plugins/remote/AGENTS.md || { echo "::error::AGENTS.md differs between local and remote plugins"; exit 1; }
          diff plugins/local/AGENTS.md plugins/standalone/AGENTS.md || { echo "::error::AGENTS.md differs between local and standalone plugins"; exit 1; }
          echo "Plugins are consistent."

      - name: Check version consistency
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          FAIL=0
          for f in server.json .claude-plugin/marketplace.json plugins/local/.claude-plugin/plugin.json plugins/remote/.claude-plugin/plugin.json plugins/standalone/.claude-plugin/plugin.json plugins/local/.plugin/plugin.json plugins/remote/.plugin/plugin.json plugins/standalone/.plugin/plugin.json plugins/local/.codex-plugin/plugin.json plugins/remote/.codex-plugin/plugin.json plugins/standalone/.codex-plugin/plugin.json; do
            if ! grep -q "\"version\": \"$VERSION\"" "$f"; then
              echo "::error::Version mismatch in $f (expected $VERSION). Run: bash scripts/sync-version.sh"
              FAIL=1
            fi
          done
          LOCK_VERSION=$(grep -A1 '^name = "searxng-http-mcp"' uv.lock | grep '^version' | sed 's/.*"\(.*\)".*/\1/')
          if [ "$LOCK_VERSION" != "$VERSION" ]; then
            echo "::error::Version mismatch in uv.lock (got $LOCK_VERSION, expected $VERSION). Run: uv sync"
            FAIL=1
          fi
          if [ "$FAIL" = "1" ]; then exit 1; fi
          echo "All versions are $VERSION"
