name: CI

on:
  push:
    branches-ignore: [main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  # === PR policy checks (pull_request only) ===
  pr-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Block fork PRs to main
        if: github.base_ref == 'main' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::Fork PRs cannot target main. Please PR to dev first."
          exit 1

      - name: Verify PRs to main come from dev
        if: github.base_ref == 'main'
        run: |
          if [ "$HEAD_REF" != "dev" ]; then
            echo "::error::PRs to main must come from the dev branch, got '$HEAD_REF'"
            exit 1
          fi
        env:
          HEAD_REF: ${{ github.head_ref }}

      - name: Block fork PRs that modify protected files
        if: github.event.pull_request.head.repo.fork == true
        run: |
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only --repo "$REPO")
          PROTECTED=$(echo "$CHANGED" | grep -E '^\.github/' || true)
          if [ -n "$PROTECTED" ]; then
            echo "::error::Fork PRs cannot modify files in .github/. Changed: $PROTECTED"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Verify fork uses unmodified workflow
        if: github.event.pull_request.head.repo.fork == true
        run: |
          OUR_SHA=$(gh api "repos/$BASE_REPO/contents/.github/workflows/ci.yml?ref=$BASE_REF" --jq '.sha')
          FORK_SHA=$(gh api "repos/$HEAD_REPO/contents/.github/workflows/ci.yml?ref=$HEAD_SHA" --jq '.sha' 2>/dev/null || echo "missing")
          if [ "$FORK_SHA" = "missing" ]; then
            echo "::error::Fork is missing .github/workflows/ci.yml"
            exit 1
          fi
          if [ "$OUR_SHA" != "$FORK_SHA" ]; then
            echo "::error::Fork's ci.yml differs from upstream. CI results are not trustworthy. Please sync your fork's workflow."
            exit 1
          fi
          echo "Fork workflow matches upstream."
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Require CI to have passed in source repo
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          TOTAL=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$HEAD_SHA&event=push" --jq '.total_count // 0')
          if [ "${TOTAL:-0}" -eq 0 ]; then
            # No push CI for this commit — check if this commit only changed ignored files.
            # Use the commit diff (not the full PR diff) so that earlier commits with passing
            # CI are not penalised by a later docs-only commit.
            COMMIT_FILES=$(gh api "repos/$HEAD_REPO/commits/$HEAD_SHA" --jq '[.files[].filename] | join("\n")')
            NON_IGNORED=$(echo "$COMMIT_FILES" | grep -v -E '(^[^/]*\.md$|^docs/|^assets/|^LICENSE$)' || true)
            if [ -z "$NON_IGNORED" ]; then
              # Head commit is docs-only. Find the latest code-changing commit in the
              # PR and require a successful push CI run for it.
              PR_COMMITS=$(gh api --paginate "repos/$BASE_REPO/pulls/$PR_NUMBER/commits?per_page=100" --jq '.[].sha')
              LATEST_CODE_SHA=""
              for sha in $PR_COMMITS; do
                C_FILES=$(gh api "repos/$HEAD_REPO/commits/$sha" --jq '[.files[].filename] | join("\n")')
                C_NON_IGNORED=$(echo "$C_FILES" | grep -v -E '(^[^/]*\.md$|^docs/|^assets/|^LICENSE$)' || true)
                if [ -n "$C_NON_IGNORED" ]; then
                  LATEST_CODE_SHA="$sha"
                fi
              done
              if [ -z "$LATEST_CODE_SHA" ]; then
                echo "All PR commits are docs-only. Passing."
                exit 0
              fi
              # Found a code-changing commit — require passing CI for it
              RUNS=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$LATEST_CODE_SHA&status=success&event=push" --jq '.total_count // 0')
              if [ "${RUNS:-0}" -gt 0 ]; then
                echo "Head commit is docs-only; latest code commit $LATEST_CODE_SHA has passing push CI."
                exit 0
              fi
              echo "::error::Head commit is docs-only but latest code-changing commit $LATEST_CODE_SHA has no successful push CI run."
              exit 1
            fi
            echo "::error::No push-triggered CI run found but head commit changes non-ignored files: $NON_IGNORED"
            exit 1
          fi
          MAX_ATTEMPTS=12
          for i in $(seq 1 $MAX_ATTEMPTS); do
            RUNS=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$HEAD_SHA&status=success&event=push" --jq '.total_count')
            if [ "$RUNS" -gt 0 ]; then
              echo "Source repo CI passed ($RUNS successful run(s) found in $HEAD_REPO)."
              exit 0
            fi
            FAILED=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$HEAD_SHA&event=push" \
              --jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")] | first | .conclusion // empty')
            if [ -n "$FAILED" ]; then
              URL=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$HEAD_SHA&event=push" \
                --jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "cancelled" or .conclusion == "timed_out")] | first | .html_url')
              echo "::error::Push-triggered CI run concluded with '$FAILED': $URL"
              exit 1
            fi
            if [ "$i" -eq "$MAX_ATTEMPTS" ]; then
              echo "::error::No successful push-triggered CI run found in $HEAD_REPO for commit $HEAD_SHA after $((MAX_ATTEMPTS * 15)) seconds."
              exit 1
            fi
            echo "Waiting for push CI to complete... (attempt $i/$MAX_ATTEMPTS)"
            sleep 15
          done
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REPO: ${{ github.repository }}

  # === Copilot code review gate (PRs targeting dev only, skipped for dev→main) ===
  copilot-review:
    if: github.event_name == 'pull_request' && github.base_ref != 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Copilot code review
        run: |
          for i in $(seq 1 20); do
            STATE=$(gh api "repos/$REPO/pulls/$PR_NUMBER/reviews" \
              --jq '[.[] | select(.user.login == "copilot-pull-request-reviewer[bot]")] | last | .state // empty')
            if [ -n "$STATE" ]; then
              echo "Copilot review received (state: $STATE)."
              if [ "$STATE" = "CHANGES_REQUESTED" ]; then
                echo "::warning::Copilot requested changes — review before merging."
              fi
              exit 0
            fi
            if [ "$i" -eq 20 ]; then
              echo "::warning::Copilot review not received after 5 minutes — proceeding without it."
              exit 0
            fi
            echo "Waiting for Copilot review... (attempt $i/20)"
            sleep 15
          done
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}

  # === Plugin consistency (push + pull_request) ===
  plugin-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check plugin consistency (local vs remote)
        run: |
          diff -r plugins/local/skills plugins/remote/skills || { echo "::error::Skills differ between local and remote plugins"; exit 1; }
          diff -r plugins/local/agents plugins/remote/agents || { echo "::error::Agents differ between local and remote plugins"; exit 1; }
          echo "Plugins are consistent."

  # === Tests (push only, exclude main — never runs external code on PRs) ===
  test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install "mcp[cli]" pytest pytest-anyio httpx pytest-cov pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=mcp_server --cov-report=term-missing --cov-report=xml:coverage.xml --cov-fail-under=80

      - name: Test report summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: test-results.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            test-results.xml
            coverage.xml
