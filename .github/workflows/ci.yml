name: CI

on:
  push:
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  # === PR policy checks (pull_request only) ===
  pr-policy:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Block fork PRs to main
        if: github.base_ref == 'main' && github.event.pull_request.head.repo.fork == true
        run: |
          echo "::error::Fork PRs cannot target main. Please PR to dev first."
          exit 1

      - name: Verify PRs to main come from dev
        if: github.base_ref == 'main'
        run: |
          if [ "$HEAD_REF" != "dev" ]; then
            echo "::error::PRs to main must come from the dev branch, got '$HEAD_REF'"
            exit 1
          fi
        env:
          HEAD_REF: ${{ github.head_ref }}

      - name: Block fork PRs that modify protected files
        if: github.event.pull_request.head.repo.fork == true
        run: |
          CHANGED=$(gh pr diff "$PR_NUMBER" --name-only --repo "$REPO")
          PROTECTED=$(echo "$CHANGED" | grep -E '^\.github/' || true)
          if [ -n "$PROTECTED" ]; then
            echo "::error::Fork PRs cannot modify files in .github/. Changed: $PROTECTED"
            exit 1
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}

      - name: Verify fork uses unmodified workflow
        if: github.event.pull_request.head.repo.fork == true
        run: |
          OUR_SHA=$(gh api "repos/$BASE_REPO/contents/.github/workflows/ci.yml?ref=$BASE_REF" --jq '.sha')
          FORK_SHA=$(gh api "repos/$HEAD_REPO/contents/.github/workflows/ci.yml?ref=$HEAD_SHA" --jq '.sha' 2>/dev/null || echo "missing")
          if [ "$FORK_SHA" = "missing" ]; then
            echo "::error::Fork is missing .github/workflows/ci.yml"
            exit 1
          fi
          if [ "$OUR_SHA" != "$FORK_SHA" ]; then
            echo "::error::Fork's ci.yml differs from upstream. CI results are not trustworthy. Please sync your fork's workflow."
            exit 1
          fi
          echo "Fork workflow matches upstream."
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REPO: ${{ github.repository }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

      - name: Require CI to have passed in source repo
        if: github.event.pull_request.user.login != 'dependabot[bot]'
        run: |
          for i in $(seq 1 12); do
            RUNS=$(gh api "repos/$HEAD_REPO/actions/runs?head_sha=$HEAD_SHA&status=success&event=push" --jq '.total_count')
            if [ "$RUNS" -gt 0 ]; then
              echo "Source repo CI passed ($RUNS successful run(s) found in $HEAD_REPO)."
              exit 0
            fi
            if [ "$i" -eq 12 ]; then
              echo "::error::No successful push-triggered CI run found in $HEAD_REPO for commit $HEAD_SHA after 3 minutes. CI must pass before submitting a PR."
              exit 1
            fi
            echo "Waiting for push CI to complete... (attempt $i/12)"
            sleep 15
          done
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}

  # === Plugin consistency (push + pull_request) ===
  plugin-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Check plugin consistency (local vs remote)
        run: |
          diff -r plugins/local/skills plugins/remote/skills || { echo "::error::Skills differ between local and remote plugins"; exit 1; }
          diff -r plugins/local/agents plugins/remote/agents || { echo "::error::Agents differ between local and remote plugins"; exit 1; }
          echo "Plugins are consistent."

  # === Tests (push only, exclude main — never runs external code on PRs) ===
  test:
    if: github.event_name == 'push' && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install "mcp[cli]" pytest pytest-anyio httpx pytest-cov pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=mcp_server --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Test report summary
        if: always()
        uses: test-summary/action@37b508cfee6d4d080eedd00b5bb240a6a784a6a5 # v2
        with:
          paths: test-results.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: test-reports
          path: |
            test-results.xml
            coverage.xml
