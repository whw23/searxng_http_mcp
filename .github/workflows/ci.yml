name: CI

on:
  push:
    branches: [dev]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "!plugins/**/*.md"
  pull_request:
    branches: [dev, main]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "assets/**"
      - "LICENSE"
      - "!plugins/**/*.md"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pull-requests: read

jobs:
  plugin-consistency:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Check plugin consistency (local vs remote)
        run: |
          diff -r plugins/local/skills plugins/remote/skills || { echo "::error::Skills differ between local and remote plugins"; exit 1; }
          diff -r plugins/local/agents plugins/remote/agents || { echo "::error::Agents differ between local and remote plugins"; exit 1; }
          echo "Plugins are consistent."

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: pip install "mcp[cli]" pytest pytest-anyio httpx pytest-cov pyyaml

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml --cov=mcp_server --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Test report summary
        if: always()
        uses: test-summary/action@v2
        with:
          paths: test-results.xml

      - name: Coverage report
        if: always()
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports
          path: |
            test-results.xml
            coverage.xml
